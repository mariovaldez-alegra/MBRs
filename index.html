<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBR Alegra Collection — Marzo 2026</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* Agregamos padding al body para que el contenedor no toque los bordes superior/inferior */
    body { background: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; color: #1a1a2e; padding: 40px 15px; }
    
    /* Le damos un toque de borde redondeado y sombra para que parezca una hoja flotante */
    .wrapper { max-width: 780px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }

    /* ─── HEADER ─── */
    .header { background: #0D1B2A; padding: 28px 36px 22px; display: flex; justify-content: space-between; align-items: flex-start; }
    .header-brand { color: #fff; }
    .header-brand .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; }
    .header-brand .sub  { font-size: 10px; color: #6a9dc8; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
    .header-meta { text-align: right; }
    .header-meta .period { font-size: 20px; font-weight: 700; color: #fff; }
    .header-meta .date   { font-size: 11px; color: #6a9dc8; margin-top: 4px; }
    .header-intro { background: #0D1B2A; padding: 0 36px 24px; font-size: 12px; color: #a8c4dc; line-height: 1.6; }

    /* ─── KPI BAR ─── */
    .kpi-bar { background: #1e3a5f; display: flex; }
    .kpi-tile { flex: 1; padding: 16px 20px; text-align: center; border-right: 1px solid #2a4f7a; }
    .kpi-tile:last-child { border-right: none; }
    .kpi-label { font-size: 10px; color: #8ab4d4; text-transform: uppercase; letter-spacing: 1px; }
    .kpi-value { font-size: 22px; font-weight: 800; color: #fff; margin-top: 4px; }
    .kpi-delta { font-size: 11px; margin-top: 2px; }

    /* ─── SECTION TITLE ─── */
    .section { padding: 28px 32px 0; }
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #0D1B2A; padding-bottom: 8px; border-bottom: 2px solid #0D1B2A; margin-bottom: 20px; }
